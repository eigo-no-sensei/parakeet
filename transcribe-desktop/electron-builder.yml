appId: com.transcribe.desktop
productName: Transcribe Desktop
directories:
  output: dist
  buildResources: resources

files:
  - main/**/*
  - renderer/**/*
  - package.json
  - utils/**/*

extraResources:
  - from: models/
    to: models/
    filter:
      - "*.onnx"
      - "*.json"

win:
  target: 
    - target: nsis
      arch: [x64, arm64]
  icon: resources/icon.ico
  requestedExecutionLevel: asInvoker

mac:
  target: 
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false

linux:
  target: AppImage
  icon: resources/icon.png
  category: AudioVideo

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
